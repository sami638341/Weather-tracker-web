<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weather Details</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container fade-in">

  <button onclick="goBack()" class="back-btn">⬅ Back</button>

  <h1 id="day-name"></h1>

  <img id="icon" style="width:100px">

  <h2 id="temp"></h2>

  <p id="desc"></p>

  <!-- EXTRA INFO (🔥 PREMIUM LOOK) -->
  <div class="extra-info">
    <div class="info-card">
      <p>🌡 Feels Like</p>
      <h3 id="feels"></h3>
    </div>

    <div class="info-card">
      <p>💧 Humidity</p>
      <h3 id="humidity"></h3>
    </div>

    <div class="info-card">
      <p>🌬 Wind</p>
      <h3 id="wind"></h3>
    </div>
  </div>

</div>

<script src="details.js"></script>

</body>
</html>
