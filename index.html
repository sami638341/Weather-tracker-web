<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeatherX</title>
<link rel="stylesheet" href="style.css">
</head>

<body id="body">

<div class="container">

  <div class="topbar">
    <h2>🌦 WeatherX</h2>

    <div class="actions">
      <input type="text" id="search" placeholder="City..."
        onkeypress="if(event.key==='Enter') searchWeather()">
      <button onclick="toggleTheme()">🌙</button>
    </div>
  </div>

  <div id="weather" class="card big"></div>

  <h3>7 Day Forecast</h3>
  <div id="forecast"></div>

</div>

<script src="script.js"></script>
</body>
</html>
