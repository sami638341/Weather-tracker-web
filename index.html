<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <div class="top">
    <input type="text" id="search" placeholder="Search city...">
    <button onclick="searchCity()">🔍</button>
  </div>

  <div class="card main">
    <h1 id="city">Loading...</h1>
    <img id="icon">
    <h2 id="temp"></h2>
    <p id="condition"></p>
  </div>

  <h3>Next 24 Hours</h3>
  <div id="hourly" class="scroll"></div>

  <h3>7 Day Forecast</h3>
  <div id="daily" class="scroll"></div>

</div>

<script src="script.js"></script>
</body>
</html>
